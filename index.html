<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>후쿠오카 여행 지도</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; overflow: hidden; }

    /* 전체화면 지도 */
    #map { position: fixed; inset: 0; z-index: 0; }
    #map-error { position: fixed; inset: 0; z-index: 1; display: none; align-items: center; justify-content: center; flex-direction: column; background: #fff3f3; color: #e53935; font-size: 13px; text-align: center; padding: 20px; }

    /* 오프스크린 패널 — 지도 위 떠있는 시트 */
    #panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      height: 45vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,.22);
      transition: height .3s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }

    /* 드래그 핸들 */
    #drag-handle {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px 8px;
      background: linear-gradient(135deg,#ff6b35,#f7c59f);
      cursor: grab; flex-shrink: 0; touch-action: none;
      border-radius: 18px 18px 0 0;
    }
    #drag-bar { width: 36px; height: 4px; background: rgba(255,255,255,0.6); border-radius: 3px; flex-shrink: 0; }
    #drag-handle h1 { font-size: 13px; font-weight: 800; color: #fff; flex: 1; }

    /* 검색 */
    #search-bar { padding: 7px 10px; border-bottom: 1px solid #eee; flex-shrink: 0; }
    #place-input { width:100%; padding:8px 12px; border:1.5px solid #ddd; border-radius:9px; font-size:14px; outline:none; }
    #place-input:focus { border-color:#ff6b35; }

    /* 탭 */
    #tabs { display:flex; border-bottom:2px solid #eee; flex-shrink:0; }
    .tab { flex:1; padding:9px 0; text-align:center; font-size:13px; font-weight:600; cursor:pointer; color:#aaa; border-bottom:2px solid transparent; margin-bottom:-2px; }
    .tab.active { color:#ff6b35; border-bottom-color:#ff6b35; }

    /* 목록 */
    #place-list { flex:1; overflow-y:auto; padding:6px 10px; -webkit-overflow-scrolling:touch; min-height:0; }

    .place-item { display:flex; align-items:center; gap:8px; padding:10px; margin-bottom:5px; background:#f8f9fa; border-radius:12px; border:1.5px solid #eee; cursor:pointer; }
    .place-item:active { background:#fff0eb; }
    .place-item.in-route { border-color:#ff6b35; background:#fff5f0; }
    .place-item.dragging { opacity:.4; }
    .place-item.drag-over { border-color:#ff6b35; background:#fff5f0; }

    /* 구간 모드 선택 */
    .segment-row { display:flex; align-items:center; justify-content:center; gap:5px; padding:4px 8px 6px; }
    .seg-arrow { color:#ccc; font-size:14px; flex-shrink:0; }
    .seg-mode-btn { padding:4px 10px; font-size:11px; font-weight:600; border:1.5px solid #ddd; border-radius:20px; background:#fff; cursor:pointer; color:#888; white-space:nowrap; transition:all .15s; }
    .seg-mode-btn.active { background:#ff6b35; border-color:#ff6b35; color:#fff; }

    .place-num-badge { min-width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff; flex-shrink:0; }
    .place-info { flex:1; min-width:0; }
    .place-name { font-size:13px; font-weight:700; color:#222; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .place-addr { font-size:11px; color:#999; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .place-rating { font-size:11px; color:#f59e0b; }

    .btn-group { display:flex; gap:4px; flex-shrink:0; }
    .add-route-btn { background:none; border:1.5px solid #ddd; border-radius:7px; color:#aaa; font-size:12px; padding:5px 8px; cursor:pointer; font-weight:600; white-space:nowrap; }
    .add-route-btn.active { background:#ff6b35; border-color:#ff6b35; color:#fff; }
    .del-btn { background:none; border:none; color:#ccc; font-size:16px; cursor:pointer; padding:3px 5px; border-radius:5px; flex-shrink:0; }
    .del-btn:active { color:#e53935; background:#fdecea; }
    .drag-handle-icon { color:#ccc; font-size:15px; cursor:grab; flex-shrink:0; }

    .empty-state { text-align:center; padding:30px 16px; color:#ccc; }
    .empty-state .icon { font-size:38px; margin-bottom:12px; }
    .empty-state p { font-size:13px; line-height:1.8; }

    /* 푸터 */
    #footer { padding:8px 10px; background:#f8f9fa; border-top:1px solid #eee; flex-shrink:0; }
    #total-info { font-weight:700; color:#444; font-size:12px; margin-bottom:4px; }
    #route-info { font-size:11px; color:#888; min-height:14px; margin-bottom:4px; }
    #clear-btn { width:100%; padding:7px; background:#fff; border:1.5px solid #ddd; border-radius:8px; font-size:12px; cursor:pointer; color:#888; }
    #clear-btn:active { border-color:#e53935; color:#e53935; }

    /* 데스크톱: 사이드 패널 */
    @media (min-width: 769px) {
      #panel {
        position: fixed;
        top: 0; left: 0; bottom: 0; right: auto;
        width: 320px; height: 100vh;
        border-radius: 0;
        box-shadow: 2px 0 16px rgba(0,0,0,.15);
        transition: none;
      }
      #drag-handle { display: none; }
    }

    #toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:#222; color:#fff; padding:8px 18px; border-radius:20px; font-size:13px; opacity:0; transition:opacity .3s; pointer-events:none; z-index:9999; white-space:nowrap; }
    #toast.show { opacity:1; }
  </style>
</head>
<body>

<div id="map"></div>
<div id="map-error">⚠️ 지도 로드 실패<br>API 키 설정을 확인해주세요</div>

<div id="panel">
  <div id="drag-handle">
    <div id="drag-bar"></div>
    <h1>🇯🇵 후쿠오카 여행 지도 v1.8</h1>
  </div>

  <div id="search-bar">
    <input id="place-input" type="text" placeholder="🔍  장소 검색..." autocomplete="off" />
  </div>

  <div id="tabs">
    <div class="tab active" onclick="switchTab('places')">📍 저장 장소</div>
    <div class="tab" onclick="switchTab('route')">🗺 내 경로</div>
  </div>

  <div id="place-list"></div>

  <div id="footer">
    <div id="total-info">경로 0개 장소</div>
    <div id="route-info"></div>
    <button id="clear-btn" onclick="clearRoute()">경로 전체 초기화</button>
  </div>
</div>

<div id="toast"></div>

<script>
window.gm_authFailure = function() {
  document.getElementById('map').style.display = 'none';
  document.getElementById('map-error').style.display = 'flex';
};

const ROUTE_COLORS = ['#e53935','#1e88e5','#43a047','#fb8c00','#8e24aa','#00acc1','#f4511e','#546e7a'];
const getRouteColor = i => ROUTE_COLORS[i % ROUTE_COLORS.length];
const DB_URL = 'https://jwkang15-1664c-default-rtdb.asia-southeast1.firebasedatabase.app/mapData.json';
const MODE_LABELS = { walking:'🚶 도보', transit:'🚌 대중교통', cycling:'🚲 자전거' };
const MODE_API    = { walking:'WALKING', transit:'TRANSIT', cycling:'BICYCLING' };

let map, directionsService, placesService, autocomplete;
let savedPlaces = [], routeOrder = [], segmentModes = {};
let routeMarkers = [], routePolylines = [], fallbackPolylines = [];
let openInfoWindow = null, currentTab = 'places';
let dragSrcIdx = null, placeIdCounter = 0, isSyncing = false;

/* ── 드래그 핸들 (모바일) ── */
function initDrag() {
  const handle = document.getElementById('drag-handle');
  const panel  = document.getElementById('panel');
  let startY, startH, moved;

  handle.addEventListener('touchstart', e => {
    startY = e.touches[0].clientY;
    startH = panel.offsetHeight;
    moved  = false;
    panel.style.transition = 'none';
  }, { passive: true });

  handle.addEventListener('touchmove', e => {
    moved = true;
    const dy   = startY - e.touches[0].clientY;
    const newH = Math.max(80, Math.min(window.innerHeight * 0.95, startH + dy));
    panel.style.height = newH + 'px';
  }, { passive: true });

  handle.addEventListener('touchend', () => {
    panel.style.transition = '';
    const h = panel.offsetHeight;
    if (!moved) {
      panel.style.height = h < window.innerHeight * 0.55 ? '85vh' : '45vh';
    } else {
      panel.style.height = h > window.innerHeight * 0.55 ? '85vh' : '45vh';
    }
  });
}

/* ── Firebase ── */
let saveTimer;
function saveToCloud() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const data = {
      places: savedPlaces.map(p => ({ id:p.id, name:p.name, address:p.address, rating:p.rating, lat:p.lat, lng:p.lng })),
      routeOrder, segmentModes, placeIdCounter
    };
    try { isSyncing = true; await fetch(DB_URL, { method:'PUT', body:JSON.stringify(data) }); setTimeout(() => { isSyncing = false; }, 1500); }
    catch(e) { isSyncing = false; }
  }, 400);
}

async function loadFromCloud() {
  try { const data = await (await fetch(DB_URL)).json(); if (data) applyCloudData(data); else renderList(); }
  catch(e) { renderList(); }
}

function applyCloudData(data) {
  savedPlaces.forEach(p => p.marker.setMap(null));
  routeMarkers.forEach(m => m.setMap(null));
  routePolylines.forEach(p => p.setMap(null));
  fallbackPolylines.forEach(p => p.setMap(null));
  savedPlaces = []; routeOrder = []; routeMarkers = []; routePolylines = []; fallbackPolylines = [];
  if (data.placeIdCounter) placeIdCounter = data.placeIdCounter;
  if (data.segmentModes)   segmentModes   = data.segmentModes;
  /* 이전 버전 호환: currentMode → 전 구간 적용 */
  if (data.currentMode && !Object.keys(segmentModes).length && data.routeOrder?.length > 1) {
    for (let i = 0; i < data.routeOrder.length - 1; i++) segmentModes[i] = data.currentMode;
  }
  if (Array.isArray(data.places))     data.places.forEach(p => restorePlace(p));
  if (Array.isArray(data.routeOrder)) { routeOrder = data.routeOrder; savedPlaces.forEach(p => { p.inRoute = routeOrder.includes(p.id); }); }
  renderList(); drawRoute();
}

function startRealtimeSync() {
  const stream = new EventSource(DB_URL);
  stream.addEventListener('put', e => {
    if (isSyncing) return;
    const d = JSON.parse(e.data).data; if (!d) return;
    applyCloudData(d); showToast('다른 기기에서 변경됐어요 🔄');
  });
  stream.onerror = () => stream.close();
}

/* ── 마커 ── */
function makeMarkerIcon(color, label) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40"><path d="M16 0C7.163 0 0 7.163 0 16c0 10 16 24 16 24s16-14 16-24C32 7.163 24.837 0 16 0z" fill="${color}" stroke="white" stroke-width="1.5"/><text x="16" y="21" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="sans-serif" font-size="13" font-weight="bold">${label}</text></svg>`;
  return { url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg), scaledSize:new google.maps.Size(32,40), anchor:new google.maps.Point(16,40) };
}
function makeSavedIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="30" viewBox="0 0 24 30"><path d="M12 0C5.373 0 0 5.373 0 12c0 7.5 12 18 12 18S24 19.5 24 12C24 5.373 18.627 0 12 0z" fill="${color}" stroke="white" stroke-width="1.5"/><circle cx="12" cy="12" r="4" fill="white"/></svg>`;
  return { url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg), scaledSize:new google.maps.Size(24,30), anchor:new google.maps.Point(12,30) };
}

function restorePlace(p) {
  const marker = new google.maps.Marker({ position:{lat:p.lat,lng:p.lng}, map, icon:makeSavedIcon('#aaa'), title:p.name, zIndex:100 });
  const iw     = new google.maps.InfoWindow({ content:buildIW(p.id, p.name, p.rating, p.address) });
  marker.addListener('click', () => { if (openInfoWindow) openInfoWindow.close(); iw.open(map, marker); openInfoWindow = iw; });
  savedPlaces.push({ ...p, marker, iw, inRoute:false });
}

function buildIW(id, name, rating, addr) {
  return `<div style="min-width:160px;font-family:sans-serif"><b style="font-size:13px">${name}</b>${rating?`<div style="font-size:11px;color:#f59e0b;margin:3px 0">${rating}</div>`:''}${addr?`<div style="font-size:10px;color:#999;margin-bottom:8px">${addr}</div>`:''}<button onclick="addToRoute(${id})" style="background:#ff6b35;color:#fff;border:none;border-radius:6px;padding:6px 0;cursor:pointer;font-size:12px;width:100%;font-weight:700">+ 경로에 추가</button></div>`;
}

/* ── 초기화 ── */
function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center:{lat:33.5898,lng:130.4017}, zoom:13,
    gestureHandling:'greedy', mapTypeControl:false, streetViewControl:false, fullscreenControl:false,
  });
  directionsService = new google.maps.DirectionsService();
  placesService     = new google.maps.places.PlacesService(map);
  autocomplete      = new google.maps.places.Autocomplete(document.getElementById('place-input'), { fields:['name','geometry','formatted_address','rating','place_id'] });
  autocomplete.addListener('place_changed', () => {
    const place = autocomplete.getPlace(); if (!place.geometry) return;
    addSavedPlace(place); document.getElementById('place-input').value = '';
  });
  initDrag();
  loadFromCloud().then(() => startRealtimeSync());
}

function addSavedPlace(place) {
  const lat=place.geometry.location.lat(), lng=place.geometry.location.lng(), name=place.name;
  if (savedPlaces.find(p => p.name===name && Math.abs(p.lat-lat)<0.0001)) { showToast('이미 저장된 장소예요'); return; }
  const id=++placeIdCounter, addr=place.formatted_address||'', rating=place.rating?`⭐ ${place.rating}`:'';
  const marker = new google.maps.Marker({ position:{lat,lng}, map, icon:makeSavedIcon('#aaa'), title:name, zIndex:100 });
  const iw     = new google.maps.InfoWindow({ content:buildIW(id, name, rating, addr) });
  marker.addListener('click', () => { if (openInfoWindow) openInfoWindow.close(); iw.open(map, marker); openInfoWindow = iw; });
  savedPlaces.push({ id, name, address:addr, rating, lat, lng, marker, inRoute:false, iw });
  map.panTo({lat, lng}); showToast(`"${name}" 저장됐어요 📍`);
  saveToCloud(); renderList();
}

/* ── 구간 모드 ── */
function getSegmentMode(i) { return segmentModes[i] || 'walking'; }
function setSegmentMode(i, mode) { segmentModes[i] = mode; saveToCloud(); renderList(); drawRoute(); }

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['places','route'][i]===tab));
  renderList();
}

function renderList() {
  const list = document.getElementById('place-list');
  list.innerHTML = '';

  if (currentTab === 'places') {
    if (!savedPlaces.length) { list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>위 검색창에서 장소를 찾아<br/>저장해보세요</p></div>`; return; }
    savedPlaces.forEach(p => {
      const el = document.createElement('div');
      el.className = 'place-item'+(p.inRoute?' in-route':'');
      el.innerHTML = `<div class="place-info"><div class="place-name">${p.name}</div>${p.rating?`<div class="place-rating">${p.rating}</div>`:''}${p.address?`<div class="place-addr">${p.address}</div>`:''}</div><div class="btn-group"><button class="add-route-btn ${p.inRoute?'active':''}" onclick="toggleRoute(${p.id},event)">${p.inRoute?'✓':'+ 경로'}</button><button class="del-btn" onclick="deleteSavedPlace(${p.id},event)">✕</button></div>`;
      el.addEventListener('click', e => { if (e.target.closest('.btn-group')) return; map.panTo({lat:p.lat,lng:p.lng}); map.setZoom(16); if (openInfoWindow) openInfoWindow.close(); p.iw.open(map,p.marker); openInfoWindow=p.iw; });
      list.appendChild(el);
    });
  } else {
    const items = getRouteItems();
    if (!items.length) { list.innerHTML = `<div class="empty-state"><div class="icon">🗺️</div><p>장소 탭에서<br/><b>+ 경로</b> 버튼을 눌러<br/>경로를 만들어보세요</p></div>`; return; }

    items.forEach((item, i) => {
      /* 정류장 아이템 */
      const el = document.createElement('div');
      el.className = 'place-item'; el.draggable = true; el.dataset.idx = i;
      el.innerHTML = `<span class="drag-handle-icon">⠿</span><span class="place-num-badge" style="background:${getRouteColor(i)}">${i+1}</span><div class="place-info"><div class="place-name">${item.name}</div>${item.address?`<div class="place-addr">${item.address}</div>`:''}</div><button class="del-btn" onclick="removeFromRoute(${i},event)">✕</button>`;
      el.addEventListener('click', e => { if (e.target.classList.contains('del-btn')||e.target.classList.contains('drag-handle-icon')) return; map.panTo({lat:item.lat,lng:item.lng}); map.setZoom(15); });
      el.addEventListener('dragstart', () => { dragSrcIdx=i; setTimeout(()=>el.classList.add('dragging'),0); });
      el.addEventListener('dragend',   () => el.classList.remove('dragging'));
      el.addEventListener('dragover',  e => { e.preventDefault(); document.querySelectorAll('.place-item').forEach(x=>x.classList.remove('drag-over')); el.classList.add('drag-over'); });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
      el.addEventListener('drop', e => { e.preventDefault(); el.classList.remove('drag-over'); if (dragSrcIdx===null||dragSrcIdx===i) return; const arr=[...routeOrder],[moved]=arr.splice(dragSrcIdx,1); arr.splice(i,0,moved); routeOrder=arr; savedPlaces.forEach(p=>{p.inRoute=routeOrder.includes(p.id);}); saveToCloud();renderList();drawRoute(); dragSrcIdx=null; });
      list.appendChild(el);

      /* 구간 모드 선택 (정류장 사이) */
      if (i < items.length - 1) {
        const cur = getSegmentMode(i);
        const seg = document.createElement('div');
        seg.className = 'segment-row';
        seg.innerHTML = `<span class="seg-arrow">↓</span>` +
          ['walking','transit','cycling'].map(m =>
            `<button class="seg-mode-btn${cur===m?' active':''}" onclick="setSegmentMode(${i},'${m}')">${MODE_LABELS[m]}</button>`
          ).join('');
        list.appendChild(seg);
      }
    });
  }
  document.getElementById('total-info').textContent = `경로 ${getRouteItems().length}개 장소`;
}

function getRouteItems() { return routeOrder.map(id=>savedPlaces.find(p=>p.id===id)).filter(Boolean); }

function toggleRoute(id,e) { e.stopPropagation(); const p=savedPlaces.find(x=>x.id===id); if(!p) return; if(p.inRoute){routeOrder=routeOrder.filter(x=>x!==id);p.inRoute=false;showToast('경로에서 제거됐어요');}else{routeOrder.push(id);p.inRoute=true;showToast(`"${p.name}" 경로 추가 ✅`);} saveToCloud();renderList();drawRoute(); }
function addToRoute(id) { const p=savedPlaces.find(x=>x.id===id); if(!p||p.inRoute) return; routeOrder.push(id);p.inRoute=true; showToast(`"${p.name}" 경로 추가 ✅`); if(openInfoWindow) openInfoWindow.close(); saveToCloud();renderList();drawRoute(); }
function removeFromRoute(idx,e) { e.stopPropagation(); const id=routeOrder[idx]; routeOrder.splice(idx,1); const p=savedPlaces.find(x=>x.id===id); if(p) p.inRoute=false; saveToCloud();renderList();drawRoute(); }
function deleteSavedPlace(id,e) { e.stopPropagation(); const idx=savedPlaces.findIndex(p=>p.id===id); if(idx===-1) return; savedPlaces[idx].marker.setMap(null); routeOrder=routeOrder.filter(x=>x!==id); savedPlaces.splice(idx,1); saveToCloud();renderList();drawRoute(); showToast('장소가 삭제됐어요'); }
function clearRoute() { if(!routeOrder.length) return; if(!confirm('경로를 모두 초기화할까요?')) return; routeOrder=[];segmentModes={};savedPlaces.forEach(p=>p.inRoute=false); saveToCloud();renderList();drawRoute(); showToast('경로 초기화됐어요'); }

/* ── 경로 그리기 ── */
function applyPerpendicularOffset(path, offsetMeters) {
  if (Math.abs(offsetMeters)<0.01||path.length<2) return path;
  const R=6371000, getLat=p=>typeof p.lat==='function'?p.lat():p.lat, getLng=p=>typeof p.lng==='function'?p.lng():p.lng;
  return path.map((point,i) => {
    const prev=path[Math.max(0,i-1)],next=path[Math.min(path.length-1,i+1)];
    const lat1=getLat(prev)*Math.PI/180,lng1=getLng(prev)*Math.PI/180,lat2=getLat(next)*Math.PI/180,lng2=getLng(next)*Math.PI/180;
    const perpBearing=Math.atan2(Math.sin(lng2-lng1)*Math.cos(lat2),Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(lng2-lng1))+Math.PI/2;
    const curLat=getLat(point)*Math.PI/180;
    return { lat:getLat(point)+(offsetMeters/R)*Math.cos(perpBearing)*180/Math.PI, lng:getLng(point)+(offsetMeters/R)*Math.sin(perpBearing)/Math.cos(curLat)*180/Math.PI };
  });
}

function drawRoute() {
  routeMarkers.forEach(m=>m.setMap(null));    routeMarkers=[];
  routePolylines.forEach(p=>p.setMap(null));  routePolylines=[];
  fallbackPolylines.forEach(p=>p.setMap(null));fallbackPolylines=[];
  document.getElementById('route-info').textContent='';

  const items=getRouteItems();
  savedPlaces.forEach(p=>{const idx=routeOrder.indexOf(p.id);p.marker.setIcon(makeSavedIcon(idx>=0?getRouteColor(idx):'#bbb'));});
  if(!items.length) return;

  items.forEach((item,i)=>{
    const m=new google.maps.Marker({position:{lat:item.lat,lng:item.lng},map,icon:makeMarkerIcon(getRouteColor(i),i+1),title:`${i+1}. ${item.name}`,zIndex:1000+i});
    m.addListener('click',()=>{if(openInfoWindow)openInfoWindow.close();const iw=new google.maps.InfoWindow({content:`<b>${i+1}. ${item.name}</b>`});iw.open(map,m);openInfoWindow=iw;});
    routeMarkers.push(m);
  });

  const bounds=new google.maps.LatLngBounds();
  items.forEach(p=>bounds.extend({lat:p.lat,lng:p.lng}));
  map.fitBounds(bounds,{top:50,right:50,bottom:50,left:50});
  if(items.length<2) return;

  document.getElementById('route-info').textContent='경로 계산 중...';

  const segCount=items.length-1;
  const segResults=new Array(segCount);
  let done=0;

  for(let i=0;i<segCount;i++){
    const from=items[i], to=items[i+1], mode=getSegmentMode(i);
    const req={origin:{lat:from.lat,lng:from.lng},destination:{lat:to.lat,lng:to.lng},travelMode:google.maps.TravelMode[MODE_API[mode]]};
    if(mode==='transit') req.transitOptions={departureTime:new Date()};
    (idx=>{
      directionsService.route(req,(result,status)=>{
        segResults[idx]={result,status,mode};
        if(++done===segCount) renderAllSegments(items,segResults);
      });
    })(i);
  }
}

function renderAllSegments(items, segs) {
  let totalDist=0, totalDur=0;
  const modeUsed=new Set();

  segs.forEach((seg,i)=>{
    const color=getRouteColor(i+1);

    if(seg.status==='OK'){
      const legs=seg.result.routes[0].legs;
      legs.forEach(leg=>{
        totalDist+=leg.distance.value;
        totalDur+=leg.duration.value;

        if(seg.mode==='transit'){
          /* 대중교통: 도보 구간 점선 회색, 버스/지하철 구간 색상 실선 */
          leg.steps.forEach(step=>{
            const isWalk=(step.travel_mode==='WALKING');
            const poly=new google.maps.Polyline({
              path:step.path, map,
              strokeColor: isWalk?'#888':color,
              strokeWeight: isWalk?3:5,
              strokeOpacity: isWalk?0:0.9,
              zIndex:100+i,
              icons: isWalk
                ? [{icon:{path:'M 0,-1 0,1',strokeOpacity:0.7,strokeColor:'#888',scale:3},offset:'0',repeat:'12px'}]
                : [{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:3.5,strokeColor:'#fff',strokeWeight:1,fillColor:color,fillOpacity:1},offset:'20%',repeat:'250px'}]
            });
            routePolylines.push(poly);
          });
        } else {
          const path=[];
          leg.steps.forEach(s=>s.path.forEach(ll=>path.push(ll)));
          const op=applyPerpendicularOffset(path,(i-(segs.length-1)/2)*8);
          routePolylines.push(new google.maps.Polyline({path:op,map,strokeColor:color,strokeWeight:5,strokeOpacity:0.9,zIndex:100+i,icons:[{icon:{path:google.maps.SymbolPath.FORWARD_CLOSED_ARROW,scale:3.5,strokeColor:'#fff',strokeWeight:1,fillColor:color,fillOpacity:1},offset:'20%',repeat:'250px'}]}));
        }
      });
      modeUsed.add({walking:'도보',transit:'대중교통',cycling:'자전거'}[seg.mode]);
    } else {
      fallbackPolylines.push(new google.maps.Polyline({
        path:[{lat:items[i].lat,lng:items[i].lng},{lat:items[i+1].lat,lng:items[i+1].lng}],
        map,strokeColor:color,strokeWeight:4,strokeOpacity:0.5,geodesic:true
      }));
      modeUsed.add('직선');
    }
  });

  const km=(totalDist/1000).toFixed(1), min=Math.round(totalDur/60);
  const time=min>=60?`${Math.floor(min/60)}시간 ${min%60}분`:`${min}분`;
  document.getElementById('route-info').textContent=`${[...modeUsed].join(' + ')} · 총 ${km}km · 약 ${time}`;
}

let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}
</script>
